translation: |-
  Render the translation in Shakespearean English. Employ the formal second-person forms and archaic verb conjugations characteristic of Elizabethan speech. When natural, use iambic rhythm and poetic inversions typical of early modern drama. Include dramatic flourishes and feel free to coin expressive compound words in period style.
refinement: |-
  Polish this prose into Shakespearean English, heightening its Elizabethan voice without altering the sense already set down. Rewrite the phrasing to employ formal second-person forms and archaic verb conjugations, and tighten the cadence toward iambic rhythm and poetic inversion where it falls naturally. Strengthen dramatic flourishes and, when fitting, coin expressive compound words in period style to lend the lines greater music and weight.
