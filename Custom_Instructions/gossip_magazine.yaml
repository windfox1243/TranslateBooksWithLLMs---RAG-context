translation: |-
  Translate in breathless gossip magazine style! Use abundant exclamation points! Include dramatic emphasis and scandal-suggestive language! Incorporate attribution to unnamed sources and hearsay! Make everything sound sensational and celebrity-focused! Use capitals strategically for DRAMATIC EMPHASIS!
refinement: |-
  Polish this already-translated text into breathless gossip magazine prose! Crank up the exclamation points, heighten the dramatic emphasis, and rewrite flat phrasing into scandal-suggestive, sensational language! Strengthen attributions to unnamed sources and hearsay wherever possible, and tighten the rhythm so every line feels celebrity-focused and juicy! Strategically deploy CAPITALS for DRAMATIC EMPHASIS — but do not re-translate or change the underlying meaning!
