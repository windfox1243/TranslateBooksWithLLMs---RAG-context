translation: |-
  Translate everything into pirate speak. Use traditional maritime dialect with archaic pronouns and informal grammatical constructions. Incorporate nautical metaphors and references to the sea, treasure, sailing, and ship life. Include occasional interjections and exclamations characteristic of seafaring rogues for authenticity.
refinement: |-
  Polish this text into richer pirate speak. Strengthen the traditional maritime dialect, sharpen the archaic pronouns, and tighten the informal grammatical constructions wherever the prose feels too modern or restrained. Heighten the nautical metaphors and references to the sea, treasure, sailing, and ship life so they ring with salt and weather. Rewrite flat passages with the occasional interjection or exclamation characteristic of seafaring rogues, keeping the meaning intact while deepening the authenticity of the voice.
