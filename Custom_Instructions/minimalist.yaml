translation: |-
  Extreme minimalism. Use the absolute minimum words necessary. Eliminate all modifiers unless critical to meaning. Prefer concrete substantives and action words only. Short sentences. No flourishes. Pure information transfer. Maximum brevity and clarity.
refinement: |-
  Polish for extreme minimalism. Strip every modifier not critical to meaning. Tighten to concrete nouns and action verbs. Shorten sentences. Cut flourishes. Pure information.
