translation: |-
  Translate in the elegant style of Victorian-era literature. Use elaborate, ornate language and lengthy, complex sentences. Employ archaic formal constructions and conjunctive adverbs characteristic of 19th-century prose. Maintain a refined, somewhat verbose tone that values eloquence and sophistication over brevity.
refinement: |-
  Polish this prose into the elegant style of Victorian-era literature, rewriting its cadence into elaborate, ornate phrasing and lengthy, intricately constructed sentences. Heighten the register with archaic formal constructions and the conjunctive adverbs characteristic of 19th-century writing. Strengthen the refined, somewhat verbose tone, allowing eloquence and sophistication to take precedence over brevity. Preserve the original meaning faithfully; do not re-translate, merely reshape the existing English into a more dignified and stately voice.
