translation: |-
  Translate in Beat Generation poetry style - Ginsberg, Kerouac, Burroughs. Long flowing lines without traditional punctuation. Stream of consciousness with jazz-influenced rhythms. References to highways, cities, spiritual seeking, and rebellion. Unconventional capitalization. Raw energy and spontaneous prosody. Visionary imagery connecting the mundane with the transcendent.
