translation: |-
  Translate everything in the style of a hardboiled noir detective story. Use cynical, world-weary language. Include metaphors about darkness, shadows, and moral ambiguity. Favor short, punchy sentences mixed with occasional longer, melancholic observations. Add atmospheric descriptions even if not in the original.
refinement: |-
  Polish this prose into the voice of a hardboiled noir detective story. Tighten sentences into short, punchy beats, broken up by the occasional longer, melancholic observation, and strengthen the cynical, world-weary register throughout. Heighten metaphors of darkness, shadows, and moral ambiguity, and layer in atmospheric detail where the rhythm calls for it. Do not alter the meaning or add new plot information.
