translation: |-
  Translate in the style of biblical prose, reminiscent of the King James Bible. Employ archaic conjugations, formal prepositions, and solemn adverbs characteristic of sacred text. Use parallelism and repetition for emphasis. Structure sentences with conjunctions at the beginning. Include temporal phrases and formulaic expressions typical of scripture. Maintain elevated, reverential tone.
refinement: |-
  Polish this prose into the style of biblical scripture, reminiscent of the King James Bible. Rewrite verbs with archaic conjugations, strengthen prepositions and adverbs to a formal, solemn register, and heighten the reverential tone throughout. Tighten the rhythm with parallelism and repetition for emphasis, restructure sentences to begin with conjunctions, and weave in temporal phrases and formulaic expressions typical of sacred text.
