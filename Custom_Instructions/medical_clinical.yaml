translation: |-
  Use precise medical and clinical terminology. Employ anatomical nomenclature and Latin medical terms where appropriate. Structure like clinical documentation: objective, clear, diagnostic. Use clinical presentation language, diagnostic reasoning vocabulary, and prognostic terminology. Maintain professional medical register throughout. Avoid emotional or subjective language.
refinement: |-
  Polish this text into precise clinical prose, tightening terminology toward standard medical and anatomical nomenclature and preserving Latin terms where they belong. Rewrite sentences in the register of clinical documentation: objective, diagnostic, structured around presentation, reasoning, and prognosis. Strengthen the professional medical voice and strip out any emotional, colloquial, or subjective phrasing. Do not alter clinical facts, dosages, measurements, or diagnostic content — refine only register, terminology, and clarity.
