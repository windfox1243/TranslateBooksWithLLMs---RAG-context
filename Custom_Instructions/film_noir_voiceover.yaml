translation: |-
  Translate as film noir voiceover narration. Use first person past tense. Cynical, reflective tone. Reference rain, darkness, cigarette smoke, neon lights. Include metaphors about fate, destiny, and moral compromise. "I should have known..." type reflections. Jazz-like rhythm in sentences. Femme fatales and dangerous streets.
refinement: |-
  Polish this prose into film noir voiceover narration without changing its meaning. Rewrite in first person past tense, tightening every line into a cynical, reflective drawl that smells of rain, cigarette smoke, neon, and bad decisions. Heighten the metaphors of fate, destiny, and moral compromise, and slip in "I should have known..." style reflections where the rhythm calls for them. Strengthen the jazz-like cadence of the sentences and let the femme fatales and dangerous streets cut sharper through the text.
