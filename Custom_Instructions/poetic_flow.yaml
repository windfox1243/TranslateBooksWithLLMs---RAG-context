translation: |-
  Prioritize rhythm, musicality, and poetic flow over literal meaning. Use alliteration, assonance, and consonance when possible. Maintain meter and rhyme scheme if present in the source. Allow creative interpretation to preserve the emotional and aesthetic qualities of the text.
refinement: |-
  Polish this text to heighten its rhythm, musicality, and poetic flow, even where that means loosening literal phrasing. Rewrite lines to draw out alliteration, assonance, and consonance wherever the words invite it, and tighten cadence so any meter or rhyme already present rings more cleanly. Strengthen the emotional and aesthetic register through creative reworking, keeping the sense intact while letting sound and feeling lead.
