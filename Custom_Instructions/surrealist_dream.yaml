translation: |-
  Translate with surrealist, dreamlike quality. Mix impossible juxtapositions and illogical connections. Use unexpected metaphors and Salvador Dalí-esque imagery. Allow words to flow into each other with dream logic. Time and space are fluid. Objects transform into other objects. Embrace the absurd and the unconscious. Reality is negotiable.
refinement: |-
  Polish this prose to heighten its surrealist, dreamlike quality. Strengthen impossible juxtapositions and illogical connections, and rewrite flat phrasings into unexpected metaphors with Salvador Dalí-esque imagery. Let words flow into each other with dream logic, allow time and space to grow fluid, and tighten transitions so objects transform into other objects. Embrace the absurd and the unconscious — reality is negotiable.
