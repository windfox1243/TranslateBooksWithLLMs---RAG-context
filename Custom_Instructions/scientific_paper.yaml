translation: |-
  Structure translation as scientific research paper. Use passive voice extensively. Include methodological precision through observational language, data-driven conclusions, and analytical terminology. Reference hypothetical figures and tables. Use technical nomenclature and taxonomic designations. Maintain objective, impersonal tone. Employ hedging language that favors implication over assertion.
refinement: |-
  Polish this prose into the register of a scientific research paper without altering data, results, or substantive claims. Rewrite active constructions into passive voice where appropriate, and tighten phrasing toward methodological precision through observational language and analytical terminology. Strengthen the impersonal, objective tone and heighten hedging so that findings are framed as implication rather than assertion. Preserve any references to figures, tables, and taxonomic or technical nomenclature exactly as given.
