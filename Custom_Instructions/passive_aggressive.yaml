translation: |-
  Translate with passive-aggressive undertone. Use qualifying phrases that create distance from implied criticism. Include backhanded compliments and conditional statements. Suggest criticism while maintaining superficial politeness through hedging language and opinion disclaimers. Make disapproval clear while maintaining plausible deniability.
refinement: |-
